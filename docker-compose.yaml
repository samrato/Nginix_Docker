version: "3.8"

services:
  app1:
    build: .
    environment:
      - APP_NAME=app1
    expose:
      - "3000"

  app2:
    build: .
    environment:
      - APP_NAME=app2
    expose:
      - "3000"

  app3:
    build: .
    environment:
      - APP_NAME=app3
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    ports:
      - "80:8080"
      - "443:443"
    volumes:
      - ./default.conf:/etc/nginx/nginx.conf:ro
      - ./nginx-certs:/etc/nginx/certs:ro
    depends_on:
      - app1
      - app2
      - app3

